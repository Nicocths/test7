<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSVP • Océane & Nicolas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header" data-site-header></header>
      <main>
        <section class="section">
          <div class="info-grid">
            <article class="form-panel reveal">
              <p class="kicker">RSVP</p>
              <h1>Confirmer votre présence</h1>
              <p>
                Ce formulaire prépare automatiquement votre message. Il ne vous reste plus
                qu'à l'envoyer sur WhatsApp.
              </p>

              <form data-rsvp-form>
                <div class="field-row">
                  <label>
                    Présence
                    <select name="presence">
                      <option value="Présent">Présent</option>
                      <option value="Absent">Absent</option>
                    </select>
                  </label>
                  <label>
                    Nombre de personnes
                    <select name="count">
                      <option value="">Choisir</option>
                      <option>1</option>
                      <option>2</option>
                      <option>3</option>
                      <option>4</option>
                      <option>5+</option>
                    </select>
                  </label>
                </div>

                <label>
                  Nom / famille
                  <input type="text" name="guestName" placeholder="Exemple : Famille Martin" />
                </label>

                <label>
                  Option chambre
                  <select name="lodging">
                    <option value="">Aucune demande</option>
                    <option>Oui, 1 personne</option>
                    <option>Oui, couple</option>
                    <option>Oui, couple avec enfants</option>
                    <option>Je souhaite en discuter avec vous</option>
                  </select>
                </label>

                <label>
                  Allergies / régime alimentaire
                  <textarea
                    name="allergies"
                    placeholder="Optionnel : allergies, intolérances, végétarien, etc."
                  ></textarea>
                </label>

                <label>
                  Message complémentaire
                  <textarea
                    name="note"
                    placeholder="Optionnel : question, précision sur les enfants, heure d'arrivée..."
                  ></textarea>
                </label>
              </form>
            </article>

            <article class="form-panel reveal">
              <p class="kicker">Aperçu</p>
              <h2>Message prêt à envoyer</h2>
              <div class="preview-box" data-rsvp-preview></div>
              <div class="button-row">
                <a
                  class="button"
                  data-rsvp-send
                  href="https://wa.me/33783626315"
                  target="_blank"
                  rel="noreferrer"
                >
                  Envoyer sur WhatsApp
                </a>
              </div>
              <p>
                Si besoin, vous pouvez aussi nous écrire directement au
                <span data-whatsapp-display></span>.
              </p>
            </article>
          </div>
        </section>

        <section class="section">
          <p class="mini-label">FAQ</p>
          <h2>Les réponses aux questions fréquentes</h2>
          <div class="faq-grid" data-faq></div>
        </section>
      </main>
      <footer class="site-footer" data-site-footer></footer>
    </div>
    <script src="content.js"></script>
    <script src="app.js"></script>
  </body>
</html>
